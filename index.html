<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超市語文跑酷 3.0</title>
    <style>
        :root { --main: #2ecc71; --fail: #e74c3c; }
        * { box-sizing: border-box; touch-action: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #222; font-family: sans-serif; }
        
        #game-stage { 
            position: relative; width: 100%; height: 100%; max-width: 500px; margin: 0 auto; 
            background: #f1f2f6; overflow: hidden; border-left: 2px solid #333; border-right: 2px solid #333;
        }

        /* 超市背景與地板 */
        #aisle-bg {
            position: absolute; inset: 0;
            background: linear-gradient(#ccc 2px, transparent 2px);
            background-size: 100% 100px;
            animation: moveFloor 1.5s linear infinite;
            z-index: 1; opacity: 0.5;
        }
        @keyframes moveFloor { from { transform: translateY(-100px); } to { transform: translateY(0); } }

        /* 目標 UI */
        #ui-header {
            position: absolute; top: 20px; left: 0; width: 100%; z-index: 100;
            display: flex; flex-direction: column; align-items: center; pointer-events: none;
        }
        #target-card {
            background: white; border: 5px solid var(--main); border-radius: 25px; padding: 15px 40px;
            text-align: center; pointer-events: auto; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        #target-card:active { transform: scale(0.95); }

        /* 購物車 */
        #player {
            position: absolute; bottom: 80px; width: 100px; height: 100px;
            font-size: 60px; display: flex; align-items: center; justify-content: center;
            z-index: 50; transition: left 0.12s cubic-bezier(0.1, 0.5, 0.5, 1);
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.3));
        }

        /* 圖片物品 (只有圖片) */
        .item {
            position: absolute; width: 110px; height: 110px;
            background: white; border-radius: 50%; border: 4px solid #eee;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
