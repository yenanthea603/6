<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>超市跑酷 - 終極相容版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #eee; font-family: sans-serif; }
        #game-stage { position: relative; width: 100%; height: 100%; max-width: 500px; margin: 0 auto; background: #fff; overflow: hidden; border: 2px solid #333; }
        
        /* 跑道線條 */
        .lane-line { position: absolute; top: 0; bottom: 0; width: 2px; background: #ddd; z-index: 1; }
        
        /* 目標 UI */
        #target-card { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #2ecc71; color: white; padding: 10px 30px; border-radius: 50px; z-index: 100; text-align: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        /* 玩家 (購物車) */
        #player { position: absolute; bottom: 100px; width: 80px; height: 80px; background: #2c3e50; border-radius: 10px; z-index: 50; transition: left 0.1s ease; display: flex; align-items: center; justify-content: center; font-size: 40px; color: white; }
        
        /* 單字塊 */
        .word-box { position: absolute; width: 100px; height: 100px; background: white; border: 3px solid #333; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; z-index: 10; box-shadow: 0 4px 5px rgba(0,0,0,0.1); }
        
        /* 覆蓋層 */
        #mask { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .start-btn { padding: 20px 40px; font-size: 24px; background: #2ecc71; color: white; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

<div id="game-stage">
    <div id="target-card" onclick="speak()">
        <div id="target-word" style="font-size:24px;">載入中</div>
        <small>🔊 點擊發音 & 暫停</small>
    </div>

    <div class="lane-line" style="left: 33.3%;"></div>
    <div class="lane-line" style="left: 66.6%;"></div>
    
    <div id="player">🛒</div>

    <div id="mask">
        <button class="start-btn" onclick="startGame()">點擊開始遊戲</button>
    </div>
</div>

<script>
    const ITEMS = [
        {n:"牛奶", s:"🥛"}, {n:"雞腿", s:"🍗"}, {n:"衛生紙", s:"🧻"},
        {n:"麵包", s:"🍞"}, {n:"雞蛋", s:"🥚"}, {n:"蘋果", s:"🍎"},
        {n:"打折", s:"🏷️"}, {n:"收銀台", s:"💰"}, {n:"推車", s:"🛒"}
    ];

    let gameActive = false;
    let currentTarget = null;
    let lane = 1; // 0, 1, 2
    let speed = 4;
    let score = 0;
    const stage = document.getElementById('game-stage');
    const player = document.getElementById('player');
    const targetUI = document.getElementById('target-word');

    function startGame() {
        document.getElementById('mask').style.display = 'none';
        gameActive = true;
        score = 0;
        speed = 4;
        lane = 1;
        updatePlayerPos();
        nextTarget();
        gameLoop();
    }

    function nextTarget() {
        currentTarget = ITEMS[Math.floor(Math.random() * ITEMS.length)];
        targetUI.innerText = currentTarget.n;
    }

    function updatePlayerPos() {
        const stageWidth = stage.offsetWidth;
        const laneWidth = stageWidth / 3;
        player.style.left = (lane * laneWidth + (laneWidth - 80) / 2) + "px";
    }

    function spawnRow() {
        if (!gameActive) return;
        const stageWidth = stage.offsetWidth;
        const laneWidth = stageWidth / 3;
        const correct = Math.floor(Math.random() * 3);

        for (let i = 0; i < 3; i++) {
            const data = (i === correct) ? currentTarget : ITEMS[Math.floor(Math.random() * ITEMS.length)];
            const div = document.createElement('div');
            div.className = 'word-box';
            div.innerHTML = `<span>${data.s}</span><span>${data.n}</span>`;
            div.style.left = (i * laneWidth + (laneWidth - 100) / 2) + "px";
            div.style.top = "-120px";
            stage.appendChild(div);

            // 讓它掉下來
            let topPos = -120;
            const moveInterval = setInterval(() => {
                if (!gameActive) { clearInterval(moveInterval); div.remove(); return; }
                
                topPos += speed;
                div.style.top = topPos + "px";

                // 碰撞檢測
                if (topPos > stage.offsetHeight - 180 && topPos < stage.offsetHeight - 80 && i === lane) {
                    if (data.n === currentTarget.n) {
                        score += 10;
                        nextTarget();
                        speed += 0.2;
                        clearInterval(moveInterval);
                        div.remove();
                    } else {
                        gameOver();
                    }
                }

                if (topPos > stage.offsetHeight) {
                    clearInterval(moveInterval);
                    div.remove();
                }
            }, 20);
        }
    }

    function gameLoop() {
        if (!gameActive) return;
        spawnRow();
        setTimeout(gameLoop, 2500 - (speed * 100));
    }

    function gameOver() {
        gameActive = false;
        alert("撞錯囉！得分：" + score);
        location.reload();
    }

    function speak() {
        const m = new SpeechSynthesisUtterance(currentTarget.n);
        m.lang = 'zh-TW';
        window.speechSynthesis.speak(m);
    }

    // 點擊換賽道
    stage.addEventListener('mousedown', (e) => {
        if (!gameActive) return;
        if (e.clientX < window.innerWidth / 2) {
            if (lane > 0) lane--;
        } else {
            if (lane < 2) lane++;
        }
        updatePlayerPos();
    });

    window.addEventListener('resize', updatePlayerPos);
</script>
</body>
</html>
